<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Alumni - Rubath Al-Muhibbien</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f5f5f5;
  color:#333;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: linear-gradient(90deg, #1B5E20, #4CAF50);
  padding: 12px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-wrap img {
  height: 40px;
  border-radius: 50%;
}

.logo-wrap h1 {
  font-size: 16px;
  color: white;
  margin: 0;
}

/* MENU */
nav {
  display: flex;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  position: relative;
}

nav a::after {
  content:'';
  position:absolute;
  left:0;
  bottom:-3px;
  width:0%;
  height:2px;
  background:#FFD700;
  transition:0.3s;
}

nav a:hover::after {
  width:100%;
}

/* HERO */
.hero {
  padding: 50px 20px 70px;
  text-align: center;
  color: white;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(27,94,32,0.8)),
    url('Images/alumni.jpeg');
  background-size: cover;
  background-position: center;
}

/* HERO CONTENT */
.hero-content {
  max-width: 600px;
  margin: auto;
}

/* LOGO */
.logo-alumni {
  width: 120px;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.8s ease forwards;
  animation-delay: 0.2s;
}

/* JUDUL */
.hero h2 {
  font-size: 26px;
  margin-bottom: 4px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s ease forwards;
  animation-delay: 0.6s;
}

/* GARIS EMAS */
.gold-line {
  width: 240px;
  height: 3px;
  margin: 10px auto 15px;
  border-radius: 30px;
  background: linear-gradient(90deg, #C8A951, #FFD700, #C8A951);
  animation: lineGrow 0.8s ease forwards;
  animation-delay: 1s;
}

/* DESKRIPSI */
.hero p {
  font-size: 13px;
  opacity: 0;
  transform: translateY(15px);
  animation: fadeUp 0.8s ease forwards;
  animation-delay: 1.3s;
}

/* ANIMATION KEYFRAMES */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes lineGrow {
  to {
    width: 80px;
  }
}

/* FORM */
.container {
  max-width: 800px;
  margin: -60px auto 40px;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* SECTION */
h3 {
  margin-top: 25px;
  color: #1B5E20;
}

/* INPUT */
input, textarea, select {
  width: 95%;
  padding: 12px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* FIX CHECKBOX ERROR NGANAN */
.checkbox-wrap {
  display: block !important;
  width: 100%;
  text-align: left;
}

.checkbox-wrap label {
  display: block;
  align-items: flex-start;
  gap: 10px;
  justify-content: flex-start;
  width: 100%;
}

.checkbox-wrap input {
  margin-top: 4px;
}


/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #388E3C;
}

/* MOBILE */
@media(max-width:768px){
  nav {
    gap: 10px;
  }

  .container {
    margin: 20px;
    padding: 20px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo-wrap">
    <img src="Images/logo.png">
    <h1>Form Alumni Rubath Al-Muhibbien</h1>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="alumni.html">Alumni</a>
    <a href="#">Kontak</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <img src="Images/irtibath.png" class="logo-alumni">

    <h2>Pendaftaran Alumni</h2>
    <div class="gold-line"></div>
    <p>Bergabung kembali dalam silaturahmi alumni Rubath Al-Muhibbien</p>

  </div>
</section>

<!-- FORM -->
<div class="container">

<form id="formAlumni">

<h3>Data Diri</h3>

<label>Nama Lengkap</label>
<input type="text" name="nama" required>

<label>No HP / WhatsApp</label>
<input type="text" name="hp" required>

<label>Email</label>
<input type="email" name="email">

<label>Alamat</label>
<textarea name="alamat" rows="3"></textarea>

<label>Upload Foto</label>
<input type="file" id="fotoInput" accept="image/*">

<button type="button" id="btnUpload">Upload Foto</button>

<input type="text" name="foto" id="fotoLink" placeholder="Link foto akan muncul di sini" readonly>

<h3>Data Pendidikan</h3>

<label>Tahun Masuk</label>
<input type="number" name="masuk">

<label>Tahun Lulus / Keluar</label>
<input type="number" name="lulus">

<label>Program</label>
<select name="program">
  <option value="Tahfidz">Tahfidzul Qur'an</option>
  <option value="Hadits">Hadits</option>
  <option value="Lainnya">Lainnya</option>
</select>

<h3>Aktivitas Sekarang</h3>

<label>Pekerjaan / Kuliah</label>
<input type="text" name="pekerjaan">

<label>Bidang Usaha</label>
<input type="text" name="usaha">

<label>Domisili Sekarang</label>
<input type="text" name="domisili">

<h3>Kontribusi Alumni</h3>

<label>Bersedia ikut kegiatan alumni?</label>
<select name="kontribusi">
  <option value="Ya">Ya</option>
  <option value="Tidak">Tidak</option>
</select>

<label>Aktivitas Sekarang</label>
<input type="text" name="aktivitas">

<div class="checkbox-wrap">
  <label>
    <input type="checkbox" required>
    Saya bersedia menjaga nama baik <b>Rubath Al-Muhibbien & Abuya</b>
  </label>
</div>

<button type="submit">Kirim Data Alumni</button>

</form>
</div>

<script>
const uploadBtn = document.getElementById("btnUpload");
const fileInput = document.getElementById("fotoInput");
const fotoLink = document.getElementById("fotoLink");

uploadBtn.addEventListener("click", () => {
  const file = fileInput.files[0];

  if (!file) {
    alert("Pilih foto dulu bro 😅");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const base64 = e.target.result.split(",")[1];

    fetch("ISI_URL_APPS_SCRIPT_LO", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "uploadFoto",
        file: base64,
        filename: file.name,
        mimeType: file.type
      })
    })
    .then(res => res.text())
    .then(link => {
      fotoLink.value = link;
      alert("✅ Ajiiib !!! Foto berhasil diupload!");
    })
    .catch(err => {
      alert("❌ Yaaah 😅, Upload gagal");
      console.error(err);
    });
  };

  reader.readAsDataURL(file);
});
</script>
  
<script>
const form = document.getElementById("formAlumni");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbwP-Lph4badggB0NQGJcG5gt4e5GWrot9w2G9rE0kJbs0afKIExbXkFx3nsYYMr_bPF/exec", {
    method: "POST",
  body: JSON.stringify({
    action: "uploadFoto",
    file: base64,
    filename: file.name,
    mimeType: file.type
  })
})
  .then(res => res.text())
  .then(res => {

    const notif = document.createElement("div");

    notif.innerText = res.includes("Sukses")
      ? "✅ Data berhasil dikirim"
      : "❌ Gagal kirim data";

    notif.style.position = "fixed";
    notif.style.top = "20px";
    notif.style.right = "20px";
    notif.style.background = res.includes("Sukses") ? "#4CAF50" : "#F44336";
    notif.style.color = "white";
    notif.style.padding = "12px 20px";
    notif.style.borderRadius = "8px";
    notif.style.zIndex = "9999";

    document.body.appendChild(notif);

    setTimeout(() => notif.remove(), 3000);

    if (res.includes("Sukses")) form.reset();
  })
  .catch(err => {
    alert("Server error 😅");
    console.error(err);
  });
});
</script> 
  
</body>
</html>
