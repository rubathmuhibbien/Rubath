<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Alumni - Rubath Al-Muhibbien</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  html { scroll-behavior: smooth; }
  body { margin:0; font-family:'Poppins', sans-serif; background:#f5f5f5; color:#333; }

  /* NAVBAR */
  .navbar {
    position: sticky; top: 0; z-index: 1000;
    background: linear-gradient(90deg, #1B5E20, #4CAF50);
    padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
  }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-wrap img { height: 40px; border-radius: 50%; }
  .logo-wrap h1 { font-size: 16px; color: white; margin: 0; }
  nav { display: flex; gap: 20px; }
  nav a { color: white; text-decoration: none; font-size: 14px; position: relative; }
  nav a::after { content:''; position:absolute; left:0; bottom:-3px; width:0%; height:2px; background:#FFD700; transition:0.3s; }
  nav a:hover::after { width:100%; }

  /* HERO */
  .hero {
    padding: 50px 20px 70px; text-align: center; color: white;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(27,94,32,0.8)), url('Images/alumni.jpg');
    background-size: cover; background-position: center;
  }
  .hero-content { max-width: 600px; margin: auto; }
  .logo-alumni { width: 120px; opacity: 0; transform: translateY(30px); animation: fadeUp 0.8s ease forwards; animation-delay: 0.2s; }
  .hero h2 { font-size: 26px; margin-bottom: 4px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease forwards; animation-delay: 0.6s; }
  .gold-line { width: 240px; height: 3px; margin: 10px auto 15px; border-radius: 30px; background: linear-gradient(90deg, #C8A951, #FFD700, #C8A951); animation: lineGrow 0.8s ease forwards; animation-delay: 1s; }
  .hero p { font-size: 13px; opacity: 0; transform: translateY(15px); animation: fadeUp 0.8s ease forwards; animation-delay: 1.3s; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes lineGrow { to { width: 80px; } }

  /* FORM */
  .container { max-width: 800px; margin: -60px auto 40px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
  h3 { margin-top: 25px; color: #1B5E20; }
  input, textarea, select { width: 100%; padding: 12px 15px; margin-top: 8px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; background-color: #fafafa; font-family: inherit; box-sizing: border-box; display: block; transition: 0.3s; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #4CAF50; background-color: #fff; box-shadow: 0 0 5px rgba(76, 175, 80, 0.2); }
  label { display: block; margin-top: 10px; font-weight: 600; }

  .checkbox-wrap { display: flex !important; align-items: flex-start; gap: 12px; margin: 20px 0; background: #f0f7f0; padding: 15px; border-radius: 8px; }
  .checkbox-wrap input[type="checkbox"] { width: 20px !important; height: 20px !important; margin: 0 !important; flex-shrink: 0; cursor: pointer; }

  button { width: 100%; padding: 14px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
  button:hover { background: #388E3C; }
  button:disabled { background: #999; cursor: not-allowed; }

  /* PROGRESS & NOTIF */
  .progress-container { display: none; width: 100%; background: #e0e0e0; border-radius: 8px; margin: 10px 0; overflow: hidden; }
  .progress-bar { width: 0%; height: 10px; background: linear-gradient(90deg, #FFD700, #4CAF50); transition: 0.3s; }
  .loading-text { display: none; font-size: 12px; color: #666; font-style: italic; margin-bottom: 5px; }

  .toast-notif {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    padding: 15px 25px; border-radius: 50px; color: white; font-weight: 600;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 9999; white-space: nowrap;
    animation: slideIn 0.5s ease forwards;
  }
  @keyframes slideIn { from { bottom: -100px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

  @media(max-width:768px){
    .navbar { flex-direction: column; gap: 12px; padding: 15px 20px; }
    nav { width: 100%; justify-content: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
    .container { margin: 20px; margin-top: -30px; }
  }
</style>
</head>

<body>

<header class="navbar">
  <div class="logo-wrap">
    <img src="Images/logo.png" alt="Logo">
    <h1>Form Alumni Rubath Al-Muhibbien</h1>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="alumni.html">Alumni</a>
    <a href="database-alumni.html">Database</a>
    <a href="struktur">Struktur</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <img src="Images/irtibath.png" class="logo-alumni">
    <h2>Pendaftaran Alumni</h2>
    <div class="gold-line"></div>
    <p>Bergabung kembali dalam silaturahmi Ikatan Alumni Rubath Al-Muhibbien</p>
  </div>
</section>

<div class="container">
  <form id="formAlumni">
    <h3>Data Diri</h3>
    <label>Nama Lengkap</label>
    <input type="text" name="nama" required>

    <label>No HP / WhatsApp</label>
    <input type="text" name="hp" placeholder="Contoh: 0812345..." required>

    <label>Email</label>
    <input type="email" name="email">

    <label>Alamat Asal</label>
    <textarea name="alamat" rows="3"></textarea>

    <label>Upload Foto (Terbaik)</label>
    <input type="file" id="fotoInput" accept="image/*">
    
    <div id="loadingText" class="loading-text">Menyiapkan foto...</div>
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <h3>Data Pendidikan</h3>
    <label>Tahun Masuk</label>
    <input type="number" name="masuk" placeholder="Contoh: 2015">

    <label>Tahun Lulus / Keluar</label>
    <input type="number" name="lulus" placeholder="Contoh: 2018">

    <label>Program Studi</label>
    <select name="program">
      <option value="Tahfidz">Tahfidzul Qur'an</option>
      <option value="Hadits">Hadits</option>
      <option value="Lainnya">Lainnya</option>
    </select>

    <h3>Aktivitas Sekarang</h3>
    <label>Pekerjaan / Kuliah</label>
    <input type="text" name="pekerjaan" placeholder="Contoh: Mengajar / Dagang / Kerja">

    <label>Bidang / Nama Kantor / Universitas</label>
    <input type="text" name="usaha" placeholder="Contoh: Pendidikan / Kuliner / PT. ABC">

    <label>Domisili Sekarang</label>
    <input type="text" name="domisili" placeholder="Contoh: Palembang">

    <h3>Status Akhir</h3>
    <label>Menyelesaikan s/d Wisuda?</label>
    <select name="wisuda">
      <option value="Ya">Ya, Sampai Wisuda</option>
      <option value="Tidak">Tidak / Pindah</option>
    </select>

    <div class="checkbox-wrap">
      <input type="checkbox" id="setuju" required>
      <label for="setuju">Saya bersedia menjaga nama baik <b>Rubath Al-Muhibbien & Abuya</b></label>
    </div>
    
    <button type="submit" id="btnSubmit">Kirim Data Alumni</button>
    <label>Kode Validasi Alumni (Tanya Admin)</label>
    <input type="text" id="kodeAkses" placeholder="Masukkan kode keamanan..." required>
       <style="border: 2px solid #4CAF50; font-weight: bold;">
       <div id="pesanErrorKode" style="color: red; font-size: 11px; margin-top: -15px; margin-bottom: 15px; display: none;">
         ❌ Kode salah! Ente bukan alumni ya? 😅
  </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrdn2MDVH7UpAJopSpdPLlRH31Xl8XjOg",
    authDomain: "web-rubath.firebaseapp.com",
    projectId: "web-rubath",
    storageBucket: "web-rubath.firebasestorage.app",
    messagingSenderId: "606538369074",
    appId: "1:606538369074:web:2750e9c9d951bc130fd42b",
    measurementId: "G-30H5Q676LD"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  const form = document.getElementById("formAlumni");
  const btnSubmit = document.getElementById("btnSubmit");
  const progressBar = document.getElementById("progressBar");
  const progressContainer = document.getElementById("progressContainer");
  const loadingText = document.getElementById("loadingText");

  // Fungsi Toast
  const showToast = (msg, isSuccess) => {
    const toast = document.createElement("div");
    toast.className = "toast-notif";
    toast.style.background = isSuccess ? "#4CAF50" : "#F44336";
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 4000);
  };
  
 const KODE_RAHASIA = "ALUMNI_BARU_BRO";
  
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const kodeInput = document.getElementById("kodeAkses").value;

    if (kodeInput !== KODE_RAHASIA) {
      document.getElementById("pesanErrorKode").style.display = "block";
      showToast("❌ Kode Validasi Salah! Ente bukan alumni ya? 😅", false);
      return; // Stop proses submit
      
    } else {
      document.getElementById("pesanErrorKode").style.display = "none";
    }
    
    btnSubmit.disabled = true;
    btnSubmit.innerText = "Sabar ya, berkas ente lagi diproses... ⏳";
    
    const fileInput = document.getElementById("fotoInput");
    const file = fileInput.files[0];
    let finalFotoUrl = "";

    try {
      // 1. UPLOAD FOTO (Jika ada)
      if (file) {
        progressContainer.style.display = "block";
        loadingText.style.display = "block";
        
        const storageRef = ref(storage, "alumni/" + Date.now() + "_" + file.name);
        const uploadTask = uploadBytesResumable(storageRef, file);

        // Pantau Progress
        await new Promise((resolve, reject) => {
          uploadTask.on('state_changed', 
            (snapshot) => {
              const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              progressBar.style.width = progress + "%";
            }, 
            (error) => reject(error), 
            () => {
              getDownloadURL(uploadTask.snapshot.ref).then((url) => {
                finalFotoUrl = url;
                resolve();
              });
            }
          );
        });
      }

      // 2. SIMPAN DATA KE FIRESTORE
      const formData = new FormData(form);
      const dataAlumni = {
        nama: formData.get("nama"),
        hp: formData.get("hp"),
        email: formData.get("email"),
        alamat: formData.get("alamat"),
        masuk: Number(formData.get("masuk")),
        lulus: Number(formData.get("lulus")),
        program: formData.get("program"),
        pekerjaan: formData.get("pekerjaan"),
        usaha: formData.get("usaha"),
        domisili: formData.get("domisili"),
        wisuda: formData.get("wisuda"),
        foto: finalFotoUrl,
        created_at: new Date()
      };

      await addDoc(collection(db, "alumni"), dataAlumni);

      // 3. SELESAI
      showToast("✅ Ajib, silahkan ente cek halaman database 😎 ", true);
      form.reset();
      progressBar.style.width = "0%";
      progressContainer.style.display = "none";
      loadingText.style.display = "none";

    } catch (error) {
      console.error(error);
      showToast("❌ Waduh Gagal! Coba cek koneksi ente.", false);
    } finally {
      btnSubmit.disabled = false;
      btnSubmit.innerText = "Kirim Data Alumni";
    }
  });
</script>

</body>
</html>
