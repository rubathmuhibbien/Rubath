<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Alumni - Rubath Al-Muhibbien</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body { margin: 0; font-family: 'Poppins', sans-serif; background: #f4f6f8; color: #333; }

  /* HEADER - Dibuat lebih rapi & tombol seragam */
  .header {
    background: linear-gradient(90deg, #1B5E20, #4CAF50);
    padding: 12px 5%; 
    display: flex; 
    align-items: center; 
    color: white;
    position: sticky; 
    top: 0; 
    z-index: 1000; 
    box-shadow: 0 2px 15px rgba(0,0,0,0.1);
  }
  .header img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); }
  
  .header-text { display: flex; flex-direction: column; margin-left: 15px; }
  .header h2 { font-size: 16px; margin: 0; font-weight: 600; line-height: 1.1; letter-spacing: 0.5px; }
  .header p { font-size: 10px; margin: 2px 0 0; opacity: 0.8; }
  .header-nav { margin-left: auto; display: flex; gap: 12px; }

  .nav-btn {
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
    display: inline-block;
  }

  /* Tombol Home - Gaya Outline */
  .btn-home {
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.5);
  }
  .btn-home:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  /* Tombol Daftar - Gaya Solid Putih */
  .btn-daftar {
    background: white;
    color: #1B5E20;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .btn-daftar:hover {
    background: #f0f0f0;
    transform: translateY(-2px);
  }

  /* HERO */
  .hero { height: 220px; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('Images/alumni.jpg'); background-size: cover; background-position: center; }

  /* FILTER */
  .filter-box { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; padding: 15px; margin-top: -30px; }
  .filter-box input { 
    padding: 15px 25px; border-radius: 30px; border: none; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.1); font-size: 14px; 
    outline: none; transition: 0.3s; width: 220px; 
  }
  .filter-box input:focus { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(76, 175, 80, 0.2); }

  /* GRID & CARD - Compact Style */
  #dataAlumni { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
    gap: 25px; 
    padding: 40px 5%; 
    max-width: 1400px; 
    margin: auto; 
  }
  
  .card { 
    background: white; padding: 25px 15px; border-radius: 25px; text-align: center; cursor: pointer; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s ease; animation: fadeInUp 0.4s ease backwards; 
    border: 1px solid #eee;
  }
  .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: #4CAF50; }
  .card img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #f0f7f0; }
  .card h3 { font-size: 16px; margin: 10px 0 5px; color: #1B5E20; font-weight: 600; }
  .card small { font-size: 12px; color: #4CAF50; font-weight: 600; background: #e8f5e9; border-radius: 10px; padding: 5px 15px; display: inline-block; }
  
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* PAGINATION */
  .pagination { display: flex; justify-content: center; gap: 8px; padding: 20px 0 50px; }
  .pagination button { 
    padding: 8px 15px; border: none; background: white; color: #1B5E20; border-radius: 8px; 
    cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.05); font-weight: 600; transition: 0.3s;
  }
  .pagination button.active { background: #4CAF50; color: white; }

  /* POPUP */
  .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
  .popup-content { 
    background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; 
    position: relative; animation: popScale 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
  }
  @keyframes popScale { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .popup-content img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #4CAF50; margin-bottom: 15px; }
  .btn-close { margin-top: 20px; width: 100%; padding: 12px; background: #f44336; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }

  /* FOOTER */
  .footer { background: linear-gradient(180deg, #1B5E20, #0D3B15); color: white; text-align: center; padding: 50px 20px; }
  .social { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
  .social a { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: white; font-size: 18px; transition: 0.3s; }
  .yt { background: #FF0000; } .ig { background: linear-gradient(45deg,#feda75,#d62976,#962fbf); } .fb { background: #1877F2; } .tt { background: #000; }

  /* SKELETON */
  .skeleton { height: 160px; border-radius: 20px; background: linear-gradient(90deg,#eee 8%, #ddd 18%, #eee 33%); background-size: 800px 104px; animation: shine 1.2s infinite linear; }
  @keyframes shine { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }

  @media(max-width:600px){
    .header { font-size: 10px 15px; }
    .header h2 { font-size: 13px; }
    .header p { display: none; } /* Sembunyikan deskripsi panjang di HP agar gak sesak */
    .nav-btn { font-size: 10px; padding: 8px 12px; }
    #dataAlumni { grid-template-columns: repeat(2, 1fr); gap: 15px; }
 padding: 30px 15px;
    }
    .card { padding: 20px 10px; }
    .card img { width: 75px; height: 75px; }
  }
</style>
</head>

<body>

<div class="header">
  <img src="Images/logo.png">
  <div class="header-text">
    <h2>Rubath Al-Muhibbien</h2>
    <div class="header-line"></div>
    <h2>IRTIBATH</h2>
    <p>Ikatan Ruhani Timbangan Bakti Amal Tolabah Rubath</p>
  </div>
  
  <div class="header-nav">
    <a href="index.html" class="nav-btn btn-home">HOME</a>
    <a href="alumni.html" class="nav-btn btn-daftar">DAFTAR</a>
  </div>
</div>

<div class="hero"></div>

<div class="filter-box">
  <input type="text" id="searchNama" placeholder="Cari nama...">
  <input type="number" id="filterTahun" placeholder="Tahun masuk...">
</div>

<div id="dataAlumni">
  <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
</div>

<div class="pagination" id="pagination"></div>

<div class="popup" id="popup" onclick="closePopupExternal(event)">
  <div class="popup-content" id="popupContent"></div>
</div>

<footer class="footer">
  <div class="footer-content">
    <h3>Rubath Al-Muhibbien</h3>
    <p>Ikatan Ruhani Timbangan Bakti Amal Tolabah Rubath</p>
    <div class="social">
      <a href="https://www.youtube.com/@RubathAlmuhibbien" class="yt" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://instagram.com/ponpes_rubathalmuhibbien" class="ig" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://web.facebook.com/people/Rubath-Media/61552513858638/" class="fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.tiktok.com/@media_rubath" class="tt" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
  <div class="footer-bottom">© 2026 Rubath Al-Muhibbien</div>
</footer>

<script type="module">
  // --- KODE FIREBASE TETAP SAMA SEPERTI SEBELUMNYA ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrdn2MDVH7UpAJopSpdPLlRH31Xl8XjOg",
    authDomain: "web-rubath.firebaseapp.com",
    projectId: "web-rubath",
    storageBucket: "web-rubath.firebasestorage.app",
    messagingSenderId: "606538369074",
    appId: "1:606538369074:web:2750e9c9d951bc130fd42b",
    measurementId: "G-30H5Q676LD"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let dataAsli = [];
  let dataFilter = [];
  let currentPage = 1;
  const itemsPerPage = 12;

  const container = document.getElementById("dataAlumni");
  const paginasiContainer = document.getElementById("pagination");

  async function loadData() {
    try {
      // Urutkan berdasarkan angkatan TERTUA (asc) seperti permintaan sebelumnya
      const q = query(collection(db, "alumni"), orderBy("masuk", "asc"));
      const querySnapshot = await getDocs(q);
      dataAsli = [];
      querySnapshot.forEach((doc) => {
        dataAsli.push({ id: doc.id, ...doc.data() });
      });
      dataFilter = [...dataAsli];
      renderData();
    } catch (error) {
      console.error("Error loading data: ", error);
      container.innerHTML = "<p style='text-align:center;'>Gagal memuat data.</p>";
    }
  }

  window.renderData = function() {
    container.innerHTML = "";
    if (dataFilter.length === 0) {
      container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Data tidak ditemukan.</p>";
      paginasiContainer.innerHTML = "";
      return;
    }

    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paginatedData = dataFilter.slice(start, end);

    paginatedData.forEach((item, index) => {
      const imgSource = item.foto || 'Images/default-avatar.png';
      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = (index * 0.05) + "s";
      card.onclick = () => showDetail(item);
      card.innerHTML = `
        <img src="${imgSource}" onerror="this.src='https://via.placeholder.com/150'">
        <h3>${item.nama}</h3>
        <small>Masuk: ${item.masuk || '-'}</small>
      `;
      container.appendChild(card);
    });
    renderPagination();
  }

  function renderPagination() {
    paginasiContainer.innerHTML = "";
    const totalPages = Math.ceil(dataFilter.length / itemsPerPage);
    if (totalPages <= 1) return;
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.innerText = i;
      if (i === currentPage) btn.className = "active";
      btn.onclick = () => { currentPage = i; renderData(); window.scrollTo({ top: 300, behavior: 'smooth' }); };
      paginasiContainer.appendChild(btn);
    }
  }

  function handleFilter() {
    const nama = document.getElementById("searchNama").value.toLowerCase();
    const tahun = document.getElementById("filterTahun").value;
    dataFilter = dataAsli.filter(item => {
      const matchNama = item.nama.toLowerCase().includes(nama);
      const matchTahun = tahun === "" || String(item.masuk) === tahun;
      return matchNama && matchTahun;
    });
    currentPage = 1;
    renderData();
  }

  document.getElementById("searchNama").addEventListener("input", handleFilter);
  document.getElementById("filterTahun").addEventListener("input", handleFilter);

  window.showDetail = function(item) {
    const content = document.getElementById("popupContent");
    content.innerHTML = `
      <img src="${item.foto || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
      <h3>${item.nama}</h3>
      <div style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 10px; font-size:13px;">
        <p><b>📍 Domisili:</b> ${item.domisili || '-'}</p>
        <p><b>🎓 Program:</b> ${item.program || '-'}</p>
        <p><b>📅 Angkatan:</b> ${item.masuk || '-'}</p>
        <p><b>💼 Aktivitas:</b> ${item.pekerjaan || '-'}</p>
      </div>
      <button class="btn-close" onclick="closePopup()">Tutup</button>
    `;
    document.getElementById("popup").style.display = "flex";
  }

  loadData();
</script>

<script>
  function closePopup() { document.getElementById("popup").style.display = "none"; }
  function closePopupExternal(e) { if (e.target.id === "popup") closePopup(); }
</script>

</body>
</html>
