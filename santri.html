<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubath Digital Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #064e3b;
            --accent: #d97706;
            --glass: rgba(255, 255, 255, 0.9);
            --grad: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 20%, rgba(6, 78, 59, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(217, 119, 6, 0.05) 0%, transparent 40%);
        }

        /* Modern Header */
        header {
            background: var(--grad);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .logo-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
        }

        .logo-box span {
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* Main Portal Card */
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            max-width: 800px;
            width: 90%;
            margin: -40px auto 40px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .search-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: white;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        input[type="text"] {
            flex: 1;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .btn-search {
            background: var(--grad);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-search:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(6, 78, 59, 0.3); }

        /* Result Section */
        #result-area { display: none; animation: fadeIn 0.5s ease; }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--grad);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-family: 'Playfair Display', serif;
        }

        .grid-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-item {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            transition: 0.3s;
        }

        .info-item:hover { border-color: var(--accent); }

        .info-item label {
            display: block;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .info-item span { font-size: 18px; font-weight: 600; color: var(--primary); }

        .btn-download {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            background: #fff;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-download:hover { background: var(--primary); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>RUBATH</h1>
        <span>Digital Portal</span>
    </div>
    <div class="date-now" id="current-date"></div>
</header>

<div class="main-card">
    <div class="search-section">
        <h2 style="font-family: 'Playfair Display'; font-size: 32px; color: var(--primary);">Selamat Datang</h2>
        <p style="color: #64748b;">Akses data akademik santri dalam satu pintu yang aman.</p>
        
        <div class="search-box">
            <input type="text" id="nisn" placeholder="Masukkan NISN Santri...">
            <button class="btn-search" onclick="fetchSantri()">Cari Data</button>
        </div>
        <div class="loader" id="loader"></div>
    </div>

    <div id="result-area">
        <div class="profile-header">
            <div class="avatar-circle" id="avatar-init">?</div>
            <div>
                <h3 id="res-nama" style="margin: 0; font-size: 24px;">Nama Santri</h3>
                <p id="res-nisn-sub" style="margin: 0; color: var(--accent); font-weight: 600;">NISN: -</p>
            </div>
        </div>

        <div class="grid-info">
            <div class="info-item">
                <label><i class="fa-solid fa-mosque"></i> Kelas / Program</label>
                <span id="res-kelas">-</span>
            </div>
            <div class="info-item">
                <label><i class="fa-solid fa-book-quran"></i> Hafalan Terakhir</label>
                <span id="res-hafalan">-</span>
            </div>
            <div class="info-item">
                <label><i class="fa-solid fa-credit-card"></i> Status SPP</label>
                <span id="res-spp">-</span>
            </div>
            <div class="info-item">
                <label><i class="fa-solid fa-star"></i> Prestasi</label>
                <span id="res-prestasi">Sangat Baik</span>
            </div>
        </div>

        <button class="btn-download">
            <i class="fa-solid fa-file-pdf"></i> Unduh E-Rapor Digital (PDF)
        </button>
    </div>
</div>

<script>
    // Set Current Date
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', options);

    async function fetchSantri() {
        const nisn = document.getElementById('nisn').value;
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('result-area');
        const SCRIPT_URL = "URL_APPS_SCRIPT_LO_DISINI"; // GANTI INI

        if(!nisn) return alert("Masukkan NISN dulu ya!");

        loader.style.display = 'block';
        resultArea.style.display = 'none';

        try {
            const response = await fetch(`${SCRIPT_URL}?nisn=${nisn}`);
            const data = await response.json();

            if(data !== "Not Found") {
                document.getElementById('res-nama').innerText = data.nama;
                document.getElementById('res-nisn-sub').innerText = "NISN: " + nisn;
                document.getElementById('res-kelas').innerText = data.kelas;
                document.getElementById('res-hafalan').innerText = data.hafalan;
                document.getElementById('res-spp').innerText = data.spp;
                document.getElementById('avatar-init').innerText = data.nama.charAt(0);
                
                resultArea.style.display = 'block';
            } else {
                alert("Waduh, santri dengan NISN tersebut nggak ketemu.");
            }
        } catch (e) {
            alert("Koneksi gagal. Cek lagi URL Deployment Apps Script-nya.");
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
